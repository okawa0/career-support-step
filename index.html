<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COMPANY 会社概要</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
    <main>
        <section class="company">
            <div class="company__inner">
                <h2 class="company__title">
                    <img class="company__title-en" src="assets/images/company__title-en.svg">
                    <span class="company__title-jp">会社概要</span>
                </h2>

                <table class="company__table">
                    <tbody class="company__body">
                        <tr class="company__row">
                            <th class="company__term" scope="row">事業所</th>
                            <td class="company__description">
                                一般社団法人キャリアアップサポート協会（Careerup Support Association）
                            </td>
                        </tr>
                        <tr class="company__row">
                            <th class="company__term" scope="row">代表理事</th>
                            <td class="company__description">井上　剛</td>
                        </tr>
                        <tr class="company__row">
                            <th class="company__term" scope="row">設立</th>
                            <td class="company__description">2021年1月1日</td>
                        </tr>
                        <tr class="company__row">
                            <th class="company__term" scope="row">所在地</th>
                            <td class="company__description">
                                〒450-0002 愛知県名古屋市中村区名駅5丁目33−21
                            </td>
                        </tr>
                        <tr class="company__row">
                            <th class="company__term" scope="row">事務所</th>
                            <td class="company__description">
                                〒450-0003 愛知県名古屋市中村区名駅南1丁目1-14 新納屋橋ビル5F
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="company__cta-wrap">
                    <a class="company__cta" href="#contact">
                        <span class="company__cta-text">お申込み・お問合わせはコチラ</span>
                        <span class="company__cta-icon" aria-hidden="true"><img src="assets/images/cta-icon.webp" alt=""
                                class="company__cta-icon__img"></span>
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
