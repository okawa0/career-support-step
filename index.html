<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>段階的にキャリアアップ！</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
    <main>
        <section class="step">
            <div class="step__inner">
                <h2 class="step__title"><span class="step__title-line">段階的に</span><span
                        class="step__title-line">キャリアアップ！</span></h2>

                <picture class="step__arrow">
                    <source srcset="assets/images/step-arrow-pc.svg" media="(min-width: 768px)" type="image/svg+xml" />
                    <img src="assets/images/step-arrow-sp.svg" alt="" width="360" height="180" loading="lazy" />
                </picture>

                <div class="step__stage">

                    <div class="step__levels">
                        <div class="step__level step__level--grade-three">
                            <div class="step__content step__content--grade-three">
                                <p class="step__grade">3級</p>
                                <p class="step__grade-text">
                                    実用レベルに<br />
                                    チャレンジ
                                </p>
                            </div>
                            <img class="step__image" src="assets/images/step-grade-3.webp" alt="3級にチャレンジする受講者のイメージ"
                                width="120" height="120" loading="lazy" />
                        </div>
                        <div class="step__level step__level--grade-two">
                            <div class="step__content step__content--grade-two">
                                <p class="step__grade">2級</p>
                                <p class="step__grade-text">即戦力レベル</p>
                            </div>
                            <img class="step__image" src="assets/images/step-grade-2.webp" alt="2級の学習に取り組む受講者のイメージ"
                                width="120" height="120" loading="lazy" />
                        </div>
                        <div class="step__level step__level--grade-one">
                            <div class="step__content step__content--grade-one">
                                <p class="step__grade">1級</p>
                                <p class="step__grade-text">タイピングマスター</p>
                            </div>
                            <img class="step__image" src="assets/images/step-grade-1.webp"
                                alt="1級のタイピングマスターを目指す受講者のイメージ" width="120" height="120" loading="lazy" />
                        </div>
                    </div>
                    <div class="step__main">
                        <div class="step__step step__step--first"></div>
                        <div class="step__step step__step--second"></div>
                        <div class="step__step step__step--third"></div>
                        <div class="step__body">
                            <p class="step__catch">"あなたのペースで挑戦できる"</p>
                            <p class="step__text">
                                タイピングマスター検定は、3級（実用レベル）から1級（タイピングマスター）まで、レベルに応じて段階的に挑戦できます。<br />
                                「まずは実用レベルに挑戦したい」「さらに上のレベルを目指したい」<br />
                                そんな方でも、自分に合った目標を持ちながら無理なく取り組むことができます。目標に向かって挑戦を重ねることで、着実なスキルアップにつながります。
                            </p>
                        </div>
                    </div>
                </div>

                <div class="step__cta-wrap">
                    <a class="step__cta" href="#contact">
                        <span class="step__cta-text">タイピング検定を申し込む</span>
                        <span class="step__cta-icon" aria-hidden="true"><img src="assets/images/cta-icon.webp" alt=""
                                class="step__cta-icon__img"></span>
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
